<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="英语/界面样式.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.js"></script>  
    <script src="英语/js/animate.js"></script>
    <script src="英语/words/dayin3.js"></script>
    <script src="英语/words/xueshuyinyu.js"></script>
    <script src="英语/js/main.js"></script>
</head>
<body>
        <ul>
            <li>总轮数 <span id="total"></span></li>
            <li>当前回合 <span id="num"></span></li>
            <li>错题 <span id="miss"></span></li>
        </ul>

        <div id="english1" class="son">大英三</div>
        <div id="english2" class="son">学术英语</div>
        <div id="ul" style="display: none">
            <div class="li 1">15词</div>
            <div class="li 2">30词</div>
            <div class="li 3">50词</div>
        </div>
        <div class="word word1" id="words" style="display: none"></div>
        <div class="chinese word word2" id="1" style="display: none"></div>
        <div class="chinese word word3" id="2" style="display: none"></div>
        <div class="chinese word word4" id="3" style="display: none"></div>
        <div class="chinese word word5" id="4" style="display: none"></div>
        <div id="zhan">斩</div>            
        <div class="end" style="display: none">
            <div class="ending" id="end_total">总轮数: <span id="finish_total"></span></div>
            <div class="ending" id="end_miss">错题: <span id="finish_miss"></span></div>
            <div class="btn" id="keep">继续</div>
            <div class="btn" id="return">返回</div>
        </div>
    <script></script>
</body>
</html>
